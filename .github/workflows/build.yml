name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Cache ARM GCC toolchain
      id: cache-toolchain
      uses: actions/cache@v4
      with:
        path: /home/runner/arm-gcc-toolchain
        key: arm-gcc-9-2020-q2-update

    - name: Install ARM GCC toolchain
      if: steps.cache-toolchain.outputs.cache-hit != 'true'
      run: |
        sudo apt-get update
        sudo apt-get install -y xz-utils wget
        mkdir -p /home/runner/arm-gcc-toolchain
        wget -qO- "https://developer.arm.com/-/media/Files/downloads/gnu-rm/9-2020q2/gcc-arm-none-eabi-9-2020-q2-update-x86_64-linux.tar.bz2" \
          | tar -xjf - -C /home/runner/arm-gcc-toolchain --strip=1

    - name: Add toolchain to PATH
      run: echo "/home/runner/arm-gcc-toolchain/bin" >> $GITHUB_PATH

    - name: Set up Python 3
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Cache pip
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-requests

    - name: Install dependencies
      run: pip install requests

    - name: Generate F030F4 project and build
      working-directory: EXAMPLES
      run: printf '\n' | bash f030f4_demo.sh

    - name: Generate G031F8 project and build
      working-directory: EXAMPLES
      shell: bash
      run: |
        set +e
        tmpf=$(mktemp)
        printf '\n' | VERBOSE=1 DEBUG=1 bash g031f8_demo.sh 2>&1 | tee "$tmpf"
        rc=${PIPESTATUS[0]}
        if [ $rc -ne 0 ]; then
          # Annotate each compiler error line
          grep -n -i 'error:' "$tmpf" | while IFS=: read -r ln msg; do
            echo "::error file=g031f8_demo.sh,line=${ln}::${msg:0:200}"
          done
          # If no errors found by grep, dump last 20 lines as fallback
          if ! grep -qi 'error:' "$tmpf"; then
            echo "::error title=Build failed (no 'error:' in output)::$(tail -20 "$tmpf" | tr '\n' '|')"
          fi
        fi
        rm -f "$tmpf"
        exit $rc
