name: Python CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Install dependencies
      run: pip install requests

    - name: Syntax check
      run: |
        python -m py_compile stm32cgen.py
        python -m py_compile stm32cmsis.py

    - name: Run help
      run: python stm32cgen.py --help

    - name: Generate code for STM32F103C8
      run: python stm32cgen.py stm32f103c8 -m tim -f init_tim -p TIM > generated.c
